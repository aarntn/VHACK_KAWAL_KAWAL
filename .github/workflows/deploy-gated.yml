name: deploy-gated

on:
  workflow_run:
    workflows: ["ci-gates"]
    types:
      - completed

jobs:
  deploy:
    if: >-
      ${
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render fraud deploy
        if: ${{ secrets.RENDER_FRAUD_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "$RENDER_FRAUD_DEPLOY_HOOK_URL"
        env:
          RENDER_FRAUD_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRAUD_DEPLOY_HOOK_URL }}

      - name: Trigger Render wallet deploy
        if: ${{ secrets.RENDER_WALLET_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "$RENDER_WALLET_DEPLOY_HOOK_URL"
        env:
          RENDER_WALLET_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WALLET_DEPLOY_HOOK_URL }}

      - name: No deploy hooks configured
        if: ${{ secrets.RENDER_FRAUD_DEPLOY_HOOK_URL == '' && secrets.RENDER_WALLET_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "CI gates passed on main, but no Render deploy hook secrets are configured."
          echo "Set RENDER_FRAUD_DEPLOY_HOOK_URL and RENDER_WALLET_DEPLOY_HOOK_URL to enable automatic deploy."
