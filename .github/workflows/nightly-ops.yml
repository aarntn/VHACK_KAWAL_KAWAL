name: nightly-ops

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run preset contract suite (fail-fast)
        run: python project/scripts/preset_contract_check.py
      - name: Run nightly ops
        run: |
          python -m uvicorn project.app.hybrid_fraud_api:app --host 127.0.0.1 --port 8000 &
          FRAUD_PID=$!
          FRAUD_ENGINE_URL=http://127.0.0.1:8000/score_transaction python -m uvicorn project.app.wallet_gateway_api:app --host 127.0.0.1 --port 8001 &
          WALLET_PID=$!
          trap 'kill $FRAUD_PID $WALLET_PID || true' EXIT
          sleep 3

          # CI stays on legacy credit-card dataset; keep all artifacts in the same legacy family.
          python project/scripts/nightly_ops.py \
            --dataset-source creditcard \
            --dataset-path project/legacy_creditcard/creditcard.csv \
            --model-path project/legacy_creditcard/models/final_xgboost_model.pkl \
            --feature-path project/legacy_creditcard/models/feature_columns.pkl \
            --thresholds-output project/legacy_creditcard/models/decision_thresholds.pkl \
            --audit-log project/outputs/audit/fraud_audit_log.jsonl \
            --run-benchmark \
            --run-cohort-kpi \
            --run-profile-replay \
            --run-profile-health \
            --ops-summary-json project/outputs/monitoring/nightly_ops_summary.json
      - name: Enforce release gate summary
        run: |
          python project/scripts/release_gate_check.py \
            --ops-summary-json project/outputs/monitoring/nightly_ops_summary.json
      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ops-artifacts
          path: |
            project/outputs/monitoring/nightly_ops_summary.json
            project/outputs/monitoring/drift_report.json
            project/outputs/monitoring/cohort_kpi_report.json
            project/outputs/monitoring/cohort_kpi_report.csv
            project/outputs/monitoring/profile_replay_summary.json
            project/outputs/monitoring/latency_trend_report.json
            project/outputs/monitoring/latency_trend_report.csv
            project/outputs/monitoring/latency_stage_analysis.json
            project/outputs/monitoring/latency_stage_analysis.csv
            project/outputs/monitoring/demo_readiness_summary.json
            project/outputs/benchmark/latency_benchmark_*.json
            project/outputs/benchmark/latency_benchmark_*.csv
            project/outputs/figures/tables/context_calibration.json
            project/outputs/threshold_governance/latest_promotion_record.json
          if-no-files-found: warn
