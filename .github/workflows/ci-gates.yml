name: ci-gates

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run preset contract suite (fail-fast)
        run: python project/scripts/preset_contract_check.py
      - name: Run test suite
        run: python -m unittest discover -s project/tests -t . -p 'test_*.py'

  model-artifact-checksum-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify model artifact checksums
        run: ./project/scripts/verify_model_artifact_checksums.sh

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Scan Python dependencies
        run: pip-audit -r requirements.txt
