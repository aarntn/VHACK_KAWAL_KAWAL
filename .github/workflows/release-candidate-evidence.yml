name: release-candidate-evidence

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release candidate tag (e.g. v1.2.0-rc1)"
        required: true
        type: string

jobs:
  evidence-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Generate mandatory evidence bundle (must be complete)
        run: |
          python project/scripts/build_evidence_bundle.py \
            --bundle-name "evidence_bundle_${{ github.event.inputs.release_tag }}" \
            --release-tag "${{ github.event.inputs.release_tag }}" \
            --require-complete
      - name: Upload evidence bundle outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-evidence-${{ github.event.inputs.release_tag }}
          path: |
            project/outputs/evidence_bundles/evidence_bundle_${{ github.event.inputs.release_tag }}
            project/outputs/release_artifacts/evidence_bundle_${{ github.event.inputs.release_tag }}.tar.gz
          if-no-files-found: warn
